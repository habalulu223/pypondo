<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0c15;
            color: #e0e6ed;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-box {
            background: #151922;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #00f3ff;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.15);
            width: 300px;
            text-align: center;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #00f3ff;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #0b0c15;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #00f3ff;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00f3ff;
            border: none;
            color: #000;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            box-shadow: 0 0 15px #00f3ff;
            background: white;
        }
        .error {
            color: #ff0055;
            margin-bottom: 15px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>System Access</h1>

        {% with messages = get_flashed_messages(category_filter=["error"]) %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="error">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Admin ID" required autocomplete="off">
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">LOGIN</button>
            ...

</form>
<div style="margin-top: 20px; font-size: 0.9em;">
    <span style="color:#666">New here?</span>
    <a href="/register" style="color:#00f3ff; text-decoration:none;">Create an Account</a>
</div>

        </form>
    </div>
</body>
</html>
