<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join CyberCore</title>
    <link rel='icon' type='image/x-icon' href='/favicon.ico'>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #0b0c15;
            color: #e0e6ed;
            font-family: 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .register-box {
            background: #151922;
            padding: 40px;
            border-radius: 10px;
            border: 1px solid #00ff9d; /* Green for Register */
            box-shadow: 0 0 30px rgba(0, 255, 157, 0.15);
            width: 300px;
            text-align: center;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #00ff9d;
            margin-bottom: 30px;
            text-transform: uppercase;
        }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: #0b0c15;
            border: 1px solid #333;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
        }
        input:focus {
            border-color: #00ff9d;
            outline: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00ff9d;
            border: none;
            color: #000;
            font-weight: bold;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            box-shadow: 0 0 15px #00ff9d;
            background: white;
        }
        a {
            display: block;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.9em;
        }
        a:hover { color: white; }
        .error { color: #ff0055; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="register-box">
        <h1>New Player</h1>

        {% with messages = get_flashed_messages(category_filter=["error"]) %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="error">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required autocomplete="off">
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">CREATE ACCOUNT</button>
        </form>

        <a href="/login">Already have an account? Login</a>
    </div>

    <script>
        // Disable kiosk lock when on register page (user not logged in)
        if (window.pywebview && window.pywebview.api && window.pywebview.api.disable_kiosk_lock) {
            window.pywebview.api.disable_kiosk_lock();
        }

        // Block Windows shortcuts and dangerous key combinations when not logged in
        document.addEventListener('keydown', function(event) {
            // Block: Alt+Tab, Alt+Esc, Ctrl+Alt+Delete, Windows/meta key, Alt+F4, Ctrl+W
            if (
                (event.altKey && event.key === 'Tab') ||
                (event.altKey && event.key === 'Escape') ||
                (event.ctrlKey && event.altKey && event.key === 'Delete') ||
                event.key === 'Meta' ||
                event.key === 'Win' ||
                event.key === 'OS' ||
                event.keyCode === 91 || event.keyCode === 92 ||
                (event.code && event.code.toLowerCase().includes('meta')) ||
                (event.altKey && event.key === 'F4') ||
                (event.ctrlKey && event.key === 'w') ||
                (event.ctrlKey && event.key === 'W') ||
                (event.ctrlKey && event.key === 'Escape') ||
                (event.ctrlKey && event.altKey && event.key === 'Escape')
            ) {
                event.preventDefault();
                return false;
            }
        });
    </script>
</body>
</html>
