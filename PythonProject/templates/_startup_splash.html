<style>
    .startup-splash {
        position: fixed;
        inset: 0;
        display: none;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at center, rgba(10, 19, 32, 0.94), rgba(3, 6, 12, 0.985));
        z-index: 30;
        pointer-events: none;
        animation: startupFade 2.4s ease forwards;
    }

    .startup-splash__panel {
        min-width: min(82vw, 340px);
        padding: 22px 24px;
        border-radius: 16px;
        border: 1px solid rgba(0, 243, 255, 0.34);
        background: linear-gradient(180deg, rgba(16, 26, 40, 0.94), rgba(8, 12, 21, 0.96));
        box-shadow: 0 0 36px rgba(0, 243, 255, 0.16);
        text-align: center;
        color: #dceffc;
    }

    .startup-splash__mark {
        width: 62px;
        height: 62px;
        object-fit: contain;
        filter: drop-shadow(0 0 12px rgba(0, 243, 255, 0.4));
        margin-bottom: 14px;
    }

    .startup-splash__title {
        margin: 0;
        font-family: 'Orbitron', sans-serif;
        letter-spacing: 0.18em;
        color: #8ff7ff;
        font-size: 1rem;
        text-transform: uppercase;
    }

    .startup-splash__sub {
        margin: 10px 0 16px;
        color: #8da8bf;
        font-size: 0.84rem;
    }

    .startup-splash__eye-wrap,
    .startup-splash__status {
        display: none;
    }

    .startup-splash__bar {
        height: 6px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.07);
    }

    .startup-splash__bar::after {
        content: "";
        display: block;
        height: 100%;
        width: 100%;
        transform: translateX(-100%);
        background: linear-gradient(90deg, rgba(0, 243, 255, 0), rgba(0, 243, 255, 1), rgba(0, 255, 157, 0.8));
        animation: splashLoad 1.5s ease-out forwards;
    }

    body.startup-active .startup-splash {
        display: flex;
        background:
            radial-gradient(circle at center, rgba(5, 16, 30, 0.93), rgba(2, 4, 10, 0.995) 74%);
        animation: loginIntroFade 6.1s cubic-bezier(0.2, 0.7, 0.2, 1) forwards;
    }

    body.startup-active .startup-splash__panel {
        min-width: min(90vw, 720px);
        padding: 30px;
        border-radius: 26px;
        border: 1px solid rgba(255, 50, 96, 0.18);
        background: linear-gradient(180deg, rgba(8, 17, 28, 0.62), rgba(2, 5, 12, 0.84));
        box-shadow: 0 0 70px rgba(255, 50, 96, 0.1);
        backdrop-filter: blur(8px);
    }

    body.startup-active .startup-splash__mark {
        width: 78px;
        height: 78px;
        margin-bottom: 18px;
        animation: startupMarkPulse 1.4s ease-in-out infinite;
    }

    body.startup-active .startup-splash__title {
        font-size: clamp(1rem, 2vw, 1.2rem);
        letter-spacing: 0.28em;
    }

    body.startup-active .startup-splash__sub {
        margin-bottom: 22px;
    }

    body.startup-active .startup-splash__status {
        display: block;
        margin-top: 14px;
        min-height: 1.1rem;
        font-size: 0.76rem;
        color: #ff8da8;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        animation: statusSwap 5.6s steps(1, end) forwards;
    }

    body.startup-active .startup-splash__status::before {
        content: "Calibrating optic relays";
    }

    body.startup-active .startup-splash__eye-wrap {
        display: block;
        position: relative;
        width: min(70vw, 520px);
        aspect-ratio: 16 / 9;
        margin: 26px auto 22px;
        opacity: 0;
        transform: scale(0.965);
        animation: eyeWrapEnter 1.1s cubic-bezier(0.2, 0.75, 0.2, 1) 1.7s forwards;
    }

    body.startup-active .startup-splash__eye {
        position: absolute;
        inset: 0;
        border-radius: 50% / 42%;
        background:
            radial-gradient(circle at 50% 50%, rgba(255, 36, 76, 0.08), rgba(0, 0, 0, 0) 54%),
            linear-gradient(90deg, rgba(255, 36, 76, 0) 0%, rgba(255, 36, 76, 0.16) 50%, rgba(255, 36, 76, 0) 100%);
        overflow: hidden;
        box-shadow:
            inset 0 0 34px rgba(255, 44, 92, 0.16),
            0 0 44px rgba(255, 44, 92, 0.16);
    }

    body.startup-active .startup-splash__eye::before,
    body.startup-active .startup-splash__eye::after {
        content: "";
        position: absolute;
        left: -10%;
        width: 120%;
        height: 54%;
        background:
            linear-gradient(180deg, rgba(7, 14, 24, 0.98), rgba(4, 7, 14, 0.96)),
            linear-gradient(90deg, rgba(255, 54, 104, 0.22), rgba(255, 54, 104, 0));
        border-top: 1px solid rgba(255, 54, 104, 0.24);
        border-bottom: 1px solid rgba(255, 54, 104, 0.18);
        box-shadow: 0 0 24px rgba(255, 54, 104, 0.08);
        z-index: 4;
    }

    body.startup-active .startup-splash__eye::before {
        top: 0;
        transform-origin: top center;
        animation: upperLidOpen 1.35s cubic-bezier(0.2, 0.78, 0.18, 1) 3.45s forwards;
    }

    body.startup-active .startup-splash__eye::after {
        bottom: 0;
        transform-origin: bottom center;
        animation: lowerLidOpen 1.35s cubic-bezier(0.2, 0.78, 0.18, 1) 3.45s forwards;
    }

    body.startup-active .startup-splash__iris {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 27%;
        aspect-ratio: 1;
        transform: translate(-50%, -50%) scale(0.18);
        border-radius: 50%;
        background:
            radial-gradient(circle at 45% 40%, rgba(255, 232, 236, 1) 0%, rgba(255, 132, 160, 0.98) 16%, rgba(255, 40, 86, 0.84) 38%, rgba(140, 0, 28, 0.95) 62%, rgba(0, 0, 0, 1) 100%);
        box-shadow:
            0 0 42px rgba(255, 48, 94, 0.42),
            inset 0 0 26px rgba(255, 255, 255, 0.14);
        opacity: 0.18;
        z-index: 2;
        animation: irisOnline 1.05s cubic-bezier(0.22, 0.8, 0.2, 1) 3.75s forwards;
    }

    body.startup-active .startup-splash__iris::before {
        content: "";
        position: absolute;
        inset: 16%;
        border-radius: 50%;
        border: 1px solid rgba(255, 210, 222, 0.42);
        animation: irisRingSpin 5s linear infinite;
    }

    body.startup-active .startup-splash__iris::after {
        content: "";
        position: absolute;
        inset: 31%;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(2, 8, 15, 1) 0%, rgba(0, 0, 0, 1) 70%);
        box-shadow: 0 0 16px rgba(255, 48, 94, 0.35);
    }

    body.startup-active .startup-splash__scan {
        position: absolute;
        left: 11%;
        right: 11%;
        top: 50%;
        height: 2px;
        background: linear-gradient(90deg, rgba(255, 48, 94, 0), rgba(255, 166, 186, 0.95), rgba(255, 48, 94, 0));
        box-shadow: 0 0 12px rgba(255, 48, 94, 0.6);
        transform: translateY(-50%) scaleX(0.4);
        opacity: 0;
        z-index: 3;
        animation: scanSweep 1.35s cubic-bezier(0.22, 0.8, 0.2, 1) 4.2s forwards;
    }

    body.startup-active .startup-splash__trace {
        position: absolute;
        inset: 14% 4%;
        border-radius: 50%;
        border: 1px solid rgba(255, 48, 94, 0.12);
        opacity: 0;
        z-index: 1;
        animation: traceWake 1.15s cubic-bezier(0.22, 0.8, 0.2, 1) 3.55s forwards;
    }

    body.startup-active .startup-splash__trace::before,
    body.startup-active .startup-splash__trace::after {
        content: "";
        position: absolute;
        inset: 16% 8%;
        border-radius: 50%;
        border: 1px dashed rgba(255, 48, 94, 0.18);
    }

    body.startup-active .startup-splash__trace::after {
        inset: 28% 18%;
        border-style: solid;
        opacity: 0.7;
    }

    body.startup-active .startup-splash__bar {
        height: 7px;
        background: rgba(255, 255, 255, 0.05);
        box-shadow: inset 0 0 0 1px rgba(255, 48, 94, 0.12);
    }

    body.startup-active .startup-splash__bar::after {
        background: linear-gradient(90deg, rgba(255, 48, 94, 0), rgba(255, 106, 142, 0.95), rgba(255, 182, 196, 0.75));
        animation: splashLoad 2.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
    }

    @keyframes splashLoad {
        to { transform: translateX(0); }
    }

    @keyframes startupFade {
        0%, 72% { opacity: 1; visibility: visible; }
        100% { opacity: 0; visibility: hidden; }
    }

    @keyframes loginIntroFade {
        0%, 86% { opacity: 1; visibility: visible; }
        100% { opacity: 0; visibility: hidden; }
    }

    @keyframes startupMarkPulse {
        0%, 100% { transform: scale(1); filter: drop-shadow(0 0 12px rgba(255, 48, 94, 0.34)); }
        50% { transform: scale(1.04); filter: drop-shadow(0 0 18px rgba(255, 48, 94, 0.52)); }
    }

    @keyframes eyeWrapEnter {
        to {
            opacity: 1;
            transform: scale(1);
        }
    }

    @keyframes upperLidOpen {
        from { transform: translateY(0) scaleY(1); }
        to { transform: translateY(-74%) scaleY(0.62); }
    }

    @keyframes lowerLidOpen {
        from { transform: translateY(0) scaleY(1); }
        to { transform: translateY(74%) scaleY(0.62); }
    }

    @keyframes irisOnline {
        0% {
            opacity: 0.18;
            transform: translate(-50%, -50%) scale(0.18);
        }
        70% {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1.04);
        }
        100% {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
    }

    @keyframes irisRingSpin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    @keyframes scanSweep {
        0% {
            opacity: 0;
            transform: translateY(-46px) scaleX(0.42);
        }
        20% {
            opacity: 1;
        }
        100% {
            opacity: 0;
            transform: translateY(46px) scaleX(1);
        }
    }

    @keyframes traceWake {
        from { opacity: 0; transform: scale(0.92); }
        to { opacity: 1; transform: scale(1); }
    }

    @keyframes statusSwap {
        0%, 34% { opacity: 1; }
        35%, 69% { opacity: 1; }
        70%, 100% { opacity: 1; }
    }

    @media (max-width: 720px) {
        body.startup-active .startup-splash__panel {
            padding: 22px 18px;
        }

        body.startup-active .startup-splash__eye-wrap {
            width: min(86vw, 420px);
            margin: 20px auto 18px;
        }
    }

    @media (prefers-reduced-motion: reduce) {
        .startup-splash {
            display: none;
        }
    }
</style>

<div class="startup-splash" aria-hidden="true">
    <div class="startup-splash__panel">
        <img class="startup-splash__mark" src="/app-icon.png" alt="">
        <p class="startup-splash__title">PyPondo Interface</p>
        <p class="startup-splash__sub">Syncing modules and energizing the circuit grid.</p>
        <div class="startup-splash__eye-wrap">
            <div class="startup-splash__eye">
                <div class="startup-splash__trace"></div>
                <div class="startup-splash__iris"></div>
                <div class="startup-splash__scan"></div>
            </div>
        </div>
        <div class="startup-splash__bar"></div>
        <div class="startup-splash__status"></div>
    </div>
</div>

<script>
    (function() {
        if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            document.dispatchEvent(new CustomEvent('startupSequenceComplete'));
            return;
        }

        if (!document.body || !document.body.classList.contains('startup-active')) {
            return;
        }

        window.setTimeout(function() {
            document.dispatchEvent(new CustomEvent('startupSequenceComplete'));
        }, 5700);
    })();
</script>
